        function findPNbyBack(back) {
            pn = "N/PN"
            for (i = 0; i < pns.length; i++) {
                if (pns[i].BackNumber == back) {
                    pn = pns[i].PartNumber
                    break
                }
            }
            return pn;

        }

        function readpartnumber(texto) {

            if (texto.length == 4) {
                texto = findPNbyBack(texto)
            }

            regras = [["Back", 4, 1, 4, 4],
            ["TKM - India", 96, 16, 30, 14],
            ["TKM - India", 95, 16, 30, 14],
            ["TKM - India", 97, 16, 30, 14],
            ["TMNA - EUA", 250, 1, 15, 14],
            ["TLI - Filipinas", 74, 0, 11, 12],
            ["TLI - Filipinas", 73, 0, 11, 12],
            ["TLI - Filipinas", 78, 0, 11, 12],
            ["TLI - Filipinas", 68, 0, 11, 12],
            ["TLI - Filipinas", 70, 0, 11, 12],
            ["TMT - Tailândia", 166, 27, 39, 12],
            ["TMC - Japão", 152, 64, 76, 12],
            ["TMMIN - Indonésia", 134, 51, 65, 14],
            ["Tshusho - Taiwan", 106, 0, 11],
            ["Kuo - Kuozui", 66, 0, 11],
            ["Kuo - Kuozui", 91, 44, 56, 12],
            ["UMWT - Malásia", 109, 17, 27, 10],
            ["TMV - Vietnam", 24, 7, 17, 10],
            ["TME TK - Bélgica", 14, 0, 14, 14],
            ["Tshusho - China", 14, 0, 11, 14],
            ["Tshusho - Japão", 14, 0, 11, 14],
            ["Tshusho - México", 12, 0, 11],
            ["TMMIN - Indonesia", 94, 19, 31, 12]]
            check = 0
            newregra = ["Vazio", 0, 0, 0]
            partnumber = ""

            for (i = 0; i < regras.length; i++) {
                //console.log(regras[i][1])
                if (regras[i][1] == texto.length) {
                    newregra = regras[i]
                    check = 1
                    break
                }
            }

            if (check == 0) {
                console.log("regra nao encontradas para texto tamanho" + texto.length);
            }


            if (check == 1) {


                if (newregra[4] == 14) {
                    partnumber = texto.substring(newregra[2], newregra[3])
                }
                if (newregra[4] == 12) {
                    partnumber = texto.substring(newregra[2], newregra[2] + 5)
                    partnumber = partnumber + "-" + texto.substring(newregra[2] + 5, newregra[2] +
                        10)
                    partnumber = partnumber + "-" + texto.substring(newregra[2] +
                        10, newregra[2] + 12)
                }

                if (newregra[4] == 11) {
                    partnumber = texto.substring(newregra[2], newregra[2] + 5)
                    partnumber = partnumber + "-" + texto.substring(newregra[2] + 5, newregra[2] +
                        10)
                    partnumber = partnumber + "-00"
                } if (newregra[4] == 10) {
                    partnumber = texto.substring(newregra[2], newregra[2] + 5)
                    partnumber = partnumber + "-" + texto.substring(newregra[2] + 5, newregra[2] +
                        10)
                    partnumber = partnumber + "-00"
                    console.log("partnumber: " + partnumber);
                }
            }

            return partnumber
        }

        function getBack(partnumber) {
            back = "N/Back"
            for (i = 0; i < pns.length; i++) {
                if (pns[i].PartNumber == partnumber) {
                    back = pns[i].BackNumber
                    break
                }
            }
            return back;

        }

        function getAdress(partnumber) {
            adds = "N/Adress"
            for (i = 0; i < pns.length; i++) {
                if (pns[i].PartNumber == partnumber) {
                    adds = pns[i].endereco
                    break
                }
            }
            return adds;
        }
